interface:
  display_name: "Ask Algomim"
  short_description: "Built for consistent CAD and BIM results."
  icon_small: "./assets/logo.png"
  icon_large: "./assets/logo.png"
  brand_color: "#FE3D03"
  default_prompt: "Use $ask-algomim to ask Algomim about this task."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "algomim"
      description: "Hosted Algomim model delegation"
      transport: "streamable_http"
      url: "https://api.algomim.com/mcp"
